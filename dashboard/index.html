    /* Global Styles */
    :root {
        --glass-border: 1px solid rgba(255, 255, 255, 0.1);

    body {

        background-color: #F8FAFC;
    }

    .dark body {

    /* Scrollbar Hiding */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Glassmorphism Classes */
    .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: var(--glass-border);
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .dark .glass-card {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    /* Animations */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
        100% { transform: translateY(0px); }
    }

    .animate-float { animation: float 3s ease-in-out infinite; }

    /* Skeleton Loading */
    .skeleton {
        background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
    }
    .dark .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
    }
    @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    /* Custom Transitions */
    .trans-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    /* Video Player */
    .video-container {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 */
        height: 0;
        overflow: hidden;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .video-container iframe {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
    }

    /* Load More Button */
    .load-more-container {
        text-align: center;
        margin: 40px 0;
    }
    .load-more-btn {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.2);
        color: #4F46E5;

    .load-more-btn:hover {

<script>
    // --- ✅ FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDgFy0-QL0YuGgqgtcx9541Cs7QxBewRKQ",
        authDomain: "skillzoy-5ba3c.firebaseapp.com",
        projectId: "skillzoy-5ba3c",
        storageBucket: "skillzoy-5ba3c.firebasestorage.app",
        messagingSenderId: "622606995088",
        appId: "1:622606995088:web:999c8a6790e7aa30651215",
        measurementId: "G-WVHTQ4BGNJ"
    };

    // --- ✅ INITIALIZE FIREBASE ---
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    // --- ✅ STATE MANAGEMENT ---
    let appState = {
        courses: [],
        myCourses: JSON.parse(localStorage.getItem("myCourses")) || [],
        progress: JSON.parse(localStorage.getItem("courseProgress")) || {},
        darkMode: localStorage.getItem("darkMode") === "true",
        currentCourseId: null,
        lastSyncTimestamp: localStorage.getItem("lastSyncTimestamp") || null,
        pendingProgressUpdates: {},
        pendingEnrollments: []
    };

    // --- ✅ LOCAL CACHE FOR COURSES WITH 6 HOURS TTL ---
    const CACHE_KEY = "cachedCourses";
    const CACHE_TIMESTAMP_KEY = "cachedCoursesTimestamp";
    const CACHE_DURATION_MS = 6 * 60 * 60 * 1000; // 6 hours

    function saveCoursesToCache(courses) {
        localStorage.setItem(CACHE_KEY, JSON.stringify(courses));
        localStorage.setItem(CACHE_TIMESTAMP_KEY, Date.now().toString());
    }

    function loadCoursesFromCache() {
        const cached = localStorage.getItem(CACHE_KEY);
        const timestamp = localStorage.getItem(CACHE_TIMESTAMP_KEY);
        if (cached && timestamp) {
            const age = Date.now() - parseInt(timestamp);
            if (age < CACHE_DURATION_MS) {
                return JSON.parse(cached);
            }
        }
        return null;
    }

    // --- ✅ PAGINATION VARIABLES (based on filtered courses) ---
    let allCourses = [];           // all courses from cache or server
    let displayedCourses = [];     // currently filtered courses
    let currentPage = 0;
    const pageSize = 20;
    let hasMore = true;
    let loadingMore = false;

    // --- ✅ GLOBAL TOAST FUNCTION ---
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        const colorClass = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-gray-800');
        toast.className = `fixed top-6 left-1/2 transform -translate-x-1/2 ${colorClass} text-white px-6 py-3 rounded-full shadow-2xl z-[70] flex items-center gap-3 animate-float font-bold text-sm min-w-[300px] justify-center`;
        toast.innerHTML = `
            <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i>
            <span>${message}</span>
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // --- ✅ THEME ---
    function setupTheme() {
        if (appState.darkMode) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    }
    function toggleDarkMode() {
        appState.darkMode = !appState.darkMode;
        localStorage.setItem("darkMode", appState.darkMode);
        document.documentElement.classList.toggle('dark');
    }

    // --- ✅ SKELETONS ---
    function renderSkeletons() {
        const grid = document.getElementById('coursesGrid');
        grid.innerHTML = Array(6).fill(0).map(() => `
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="skeleton w-full h-40 rounded-xl mb-4"></div>
                <div class="skeleton w-3/4 h-6 rounded-lg mb-2"></div>
                <div class="skeleton w-1/2 h-4 rounded-lg mb-4"></div>
                <div class="flex justify-between">
                    <div class="skeleton w-20 h-8 rounded-lg"></div>
                    <div class="skeleton w-20 h-8 rounded-lg"></div>
                </div>
            </div>
        `).join('');
    }

    // --- ✅ ANONYMOUS AUTH + LOAD COURSES (CACHE FIRST, THEN SERVER IF EXPIRED) ---
    async function initializeApp() {
        try {
            if (!auth.currentUser) {
                await auth.signInAnonymously();
                console.log("✅ Anonymous login successful");
            }

            // 1. Try to load from cache (6h TTL)
            const cachedCourses = loadCoursesFromCache();
            if (cachedCourses && cachedCourses.length > 0) {
                allCourses = cachedCourses;
                console.log(`📦 Loaded ${allCourses.length} courses from local cache (6h TTL)`);
                renderCategories();
                renderCourses(); // render first page
            } else {
                // No valid cache: fetch from server and cache
                await fetchCoursesFromServerAndCache();
            }
        } catch (error) {
            console.error("❌ Initialization error:", error);
            showToast("⚠️ حدث خطأ في الاتصال", "error");
            document.getElementById('coursesGrid').innerHTML = `
                <div class="col-span-3 text-center py-16">
                    <div class="w-24 h-24 bg-red-100 dark:bg-red-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-500"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-2">تعذر تحميل الدورات</h3>
                    <p class="text-gray-600 dark:text-gray-400">يرجى التحقق من اتصالك بالإنترنت.</p>
                </div>
            `;
        }

        // Background periodic flush for progress/enrollments
        setInterval(() => {
            flushProgressUpdates();
            flushEnrollments();
        }, 60000);
    }

    async function fetchCoursesFromServerAndCache() {
        try {
            const snapshot = await db.collection('courses').get({ source: 'server' });
            if (!snapshot.empty) {
                const serverCourses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // sort by createdAt descending (if exists)
                serverCourses.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                allCourses = serverCourses;
                saveCoursesToCache(allCourses);
                console.log(`📡 Fetched ${allCourses.length} courses from server and cached (6h)`);
                renderCategories();
                renderCourses();
            } else {
                console.log("No courses from server");
                allCourses = [];
                renderCategories();
                renderCourses();
            }
        } catch (error) {
            console.error("❌ Error fetching courses from server:", error);
            showToast("تحديث الدورات فشل", "error");
            // fallback: try cache again (maybe expired but we still use it)
            const cached = loadCoursesFromCache();
            if (cached && cached.length) {
                allCourses = cached;
                renderCategories();
                renderCourses();
            } else {
                allCourses = [];
                renderCategories();
                renderCourses();
            }
        }
    }

    // --- ✅ RENDER CATEGORIES ---
    function renderCategories() {
        const container = document.getElementById('categoriesContainer');
        const filterSelect = document.getElementById('categoryFilter');

        if (!allCourses || allCourses.length === 0) {
            container.innerHTML = '<div class="text-gray-500 dark:text-gray-400 py-4">لا توجد تصنيفات متاحة</div>';
            filterSelect.innerHTML = '<option value="">كل التخصصات</option>';
            return;
        }

        const categories = [...new Set(allCourses.map(c => c.category || 'عام'))];
        
        container.innerHTML = `
            <div onclick="filterByCategory('all')" class="min-w-[110px] h-28 cursor-pointer rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white flex flex-col items-center justify-center gap-2 shadow-lg shadow-indigo-500/30 trans-all hover:scale-105">
                <i class="fas fa-th-large text-xl"></i>
                <span class="text-sm font-bold">الكل</span>
            </div>
        `;

        categories.forEach(cat => {
            container.innerHTML += `
                <div onclick="filterByCategory('${cat}')" class="min-w-[110px] h-28 cursor-pointer rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 flex flex-col items-center justify-center gap-2 hover:border-indigo-500 hover:shadow-lg trans-all group">
                    <div class="w-10 h-10 rounded-full bg-indigo-50 dark:bg-gray-700 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-lg group-hover:scale-110 trans-all">
                        ${getCategoryIcon(cat)}
                    </div>
                    <span class="text-sm font-bold text-gray-700 dark:text-gray-300">${cat}</span>

        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.innerText = cat;
            filterSelect.appendChild(option);
        });
    }

    function getCategoryIcon(cat) {
        const map = {
            'برمجة': '<i class="fas fa-code"></i>',

    // --- ✅ RENDER COURSES (with filter and pagination) ---
    function renderCourses(filter = null) {
        const grid = document.getElementById('coursesGrid');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        let filtered = allCourses;

        if (!filtered || filtered.length === 0) {
            grid.innerHTML = '';
            document.getElementById('noResults').classList.remove('hidden');
            document.getElementById('noResults').classList.add('flex');
            loadMoreBtn.style.display = 'none';
            return;
        }

        if (filter && filter !== 'all' && filter !== '') {
            filtered = filtered.filter(c => 
                (c.category || 'عام') === filter || 
                (c.title && c.title.includes(filter))
            );
        }

        if (filtered.length === 0) {
            grid.innerHTML = '';
            document.getElementById('noResults').classList.remove('hidden');
            document.getElementById('noResults').classList.add('flex');
            loadMoreBtn.style.display = 'none';
            return;
        }

        document.getElementById('noResults').classList.add('hidden');
        document.getElementById('noResults').classList.remove('flex');

        // Pagination: عرض أول 20 فقط
        const start = 0;
        const end = pageSize;
        const pageCourses = filtered.slice(start, end);
        const totalFiltered = filtered.length;
        const hasMoreFiltered = totalFiltered > end;

        // حفظ القائمة المعروضة في متغير عام للاستفادة منها في "تحميل المزيد"
        displayedCourses = filtered;

        // بناء HTML
        grid.innerHTML = pageCourses.map(course => {
            const isEnrolled = appState.myCourses.includes(course.id);
            const priceDisplay = (course.price === 'free' || course.price === 'مجانية') 
                ? '<span class="text-green-500 font-bold">مجانية</span>' 
                : `<span class="text-indigo-600 dark:text-indigo-400 font-bold font-mono">${course.price}</span>`;

            let videoEmbed = '';
            if (course.playlist_id) {
                videoEmbed = `<iframe class="absolute inset-0 w-full h-full" 
                                      src="https://www.youtube.com/embed/videoseries?list=${course.playlist_id}" 
                                      frameborder="0" 
                                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                      allowfullscreen
                                      loading="lazy">
                              </iframe>`;
            } else {
                videoEmbed = `<div class="absolute inset-0 w-full h-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-500"><i class="fas fa-video-slash"></i> لا يوجد فيديو</div>`;
            }

            return `
            <div class="glass-card rounded-2xl overflow-hidden hover:transform hover:-translate-y-2 trans-all group h-full flex flex-col">
                <div class="relative w-full aspect-video bg-black rounded-t-2xl overflow-hidden">
                    ${videoEmbed}
                    <div class="absolute top-2 left-2 z-20 bg-black/60 backdrop-blur-md text-white text-xs px-2 py-1 rounded-lg border border-white/20">
                        ${course.category || 'عام'}
                    </div>
                </div>
                <div class="p-5 flex flex-col flex-1">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-2 line-clamp-2">${course.title}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2 flex-1">${course.description || 'لا يوجد وصف'}</p>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
                        ${priceDisplay}
                        <button onclick="${isEnrolled ? `openPlayer('${course.id}')` : `enrollCourse('${course.id}')`}" 
                            class="${isEnrolled ? 'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30'} 
                            px-4 py-2 rounded-xl text-sm font-bold hover:brightness-110 trans-all">
                            ${isEnrolled ? 'استكمال الدورة <i class="fas fa-play text-xs mr-1"></i>' : 'تسجيل الآن'}
                        </button>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        // إظهار أو إخفاء زر "تحميل المزيد" بناءً على ما إذا كان هناك المزيد من النتائج
        if (hasMoreFiltered && (filtered.length > pageSize)) {
            loadMoreBtn.style.display = 'inline-block';
            loadMoreBtn.onclick = () => loadMoreFilteredCourses(filter);
        } else {
            loadMoreBtn.style.display = 'none';
        }
    }

    // دالة لتحميل المزيد من الدورات بناءً على الفلتر الحالي
    function loadMoreFilteredCourses(filter) {
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const grid = document.getElementById('coursesGrid');
        
        const currentDisplayCount = grid.children.length;
        const totalFiltered = displayedCourses.length;
        
        if (currentDisplayCount >= totalFiltered) {
            loadMoreBtn.style.display = 'none';
            return;
        }
        
        const nextCount = Math.min(currentDisplayCount + pageSize, totalFiltered);
        const nextCourses = displayedCourses.slice(currentDisplayCount, nextCount);
        
        nextCourses.forEach(course => {
            const isEnrolled = appState.myCourses.includes(course.id);
            const priceDisplay = (course.price === 'free' || course.price === 'مجانية') 
                ? '<span class="text-green-500 font-bold">مجانية</span>' 
                : `<span class="text-indigo-600 dark:text-indigo-400 font-bold font-mono">${course.price}</span>`;

            let videoEmbed = '';
            if (course.playlist_id) {
                videoEmbed = `<iframe class="absolute inset-0 w-full h-full" 
                                      src="https://www.youtube.com/embed/videoseries?list=${course.playlist_id}" 
                                      frameborder="0" 
                                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                      allowfullscreen
                                      loading="lazy">
                              </iframe>`;
            } else {
                videoEmbed = `<div class="absolute inset-0 w-full h-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-500"><i class="fas fa-video-slash"></i> لا يوجد فيديو</div>`;
            }

            const card = document.createElement('div');
            card.className = 'glass-card rounded-2xl overflow-hidden hover:transform hover:-translate-y-2 trans-all group h-full flex flex-col';
            card.innerHTML = `
                <div class="relative w-full aspect-video bg-black rounded-t-2xl overflow-hidden">
                    ${videoEmbed}
                    <div class="absolute top-2 left-2 z-20 bg-black/60 backdrop-blur-md text-white text-xs px-2 py-1 rounded-lg border border-white/20">
                        ${course.category || 'عام'}
                    </div>
                </div>
                <div class="p-5 flex flex-col flex-1">
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-2 line-clamp-2">${course.title}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2 flex-1">${course.description || 'لا يوجد وصف'}</p>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100 dark:border-gray-700">
                        ${priceDisplay}
                        <button onclick="${isEnrolled ? `openPlayer('${course.id}')` : `enrollCourse('${course.id}')`}" 
                            class="${isEnrolled ? 'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30'} 
                            px-4 py-2 rounded-xl text-sm font-bold hover:brightness-110 trans-all">
                            ${isEnrolled ? 'استكمال الدورة <i class="fas fa-play text-xs mr-1"></i>' : 'تسجيل الآن'}
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        if (currentDisplayCount + nextCourses.length >= totalFiltered) {
            loadMoreBtn.style.display = 'none';
        }
    }

    // --- ✅ ENROLLMENT (with batch) ---
    function enrollCourse(id) {
        if (!appState.myCourses.includes(id)) {
            appState.myCourses.push(id);
            localStorage.setItem("myCourses", JSON.stringify(appState.myCourses));
            
            if (!appState.progress[id]) {
                appState.progress[id] = { completed: [], total: 10 };
                localStorage.setItem("courseProgress", JSON.stringify(appState.progress));
            }
            
            showToast("تم التسجيل بنجاح! 🎉", "success");
            renderCourses();
            renderMyCourses();
            updateNavState();

            queueEnrollmentWrite(id);
        }
    }

    function queueEnrollmentWrite(courseId) {
        if (!auth.currentUser) return;
        appState.pendingEnrollments.push({
            userId: auth.currentUser.uid,
            courseId,
            enrolledAt: new Date().toISOString()
        });
    }

    async function flushEnrollments() {
        if (appState.pendingEnrollments.length === 0 || !auth.currentUser) return;
        
        const batch = db.batch();
        const userRef = db.collection('users').doc(auth.currentUser.uid);
        
        appState.pendingEnrollments.forEach(enrollment => {
            const enrollmentRef = userRef.collection('enrollments').doc(enrollment.courseId);
            batch.set(enrollmentRef, {
                enrolledAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        });
        
        try {
            await batch.commit();
            console.log(`✅ Flushed ${appState.pendingEnrollments.length} enrollments to Firestore`);
            appState.pendingEnrollments = [];
        } catch (error) {
            console.error("Error flushing enrollments:", error);
        }
    }

    // --- ✅ PLAYER LOGIC ---
    function openPlayer(id) {
        const course = allCourses.find(c => c.id === id);
        if (!course) return;

        appState.currentCourseId = id;
        document.getElementById('playerCourseTitle').innerText = course.title;
        document.getElementById('playerCourseDesc').innerText = course.description || '';
        
        const frame = document.getElementById('playerFrame');
        if (course.playlist_id) {
            frame.src = `https://www.youtube.com/embed/videoseries?list=${course.playlist_id}`;
        } else {
            frame.src = "";
        }

        const totalVideos = course.num || 10;
        renderPlaylistItems(id, totalVideos);
        document.getElementById('playerOverlay').classList.remove('translate-y-full');
        
        localStorage.setItem("lastViewedCourse", JSON.stringify({ id: course.id, title: course.title }));
    }

    function closePlayer() {
        document.getElementById('playerOverlay').classList.add('translate-y-full');
        document.getElementById('playerFrame').src = "";
        renderMyCourses();
        flushProgressUpdates();
    }

    function renderPlaylistItems(courseId, totalVideos) {
        const container = document.getElementById('playlistContainer');
        const progressData = appState.progress[courseId] || { completed: [] };
        let html = '';

        for (let i = 1; i <= totalVideos; i++) {
            const isCompleted = progressData.completed.includes(i);
            html += `
                <div class="flex items-center justify-between p-3 rounded-xl ${isCompleted ? 'bg-green-50 dark:bg-green-900/20' : 'bg-white dark:bg-gray-800'} border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${isCompleted ? 'bg-green-500 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">
                            ${isCompleted ? '<i class="fas fa-check"></i>' : i}
                        </div>
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-200">الدرس رقم ${i}</span>
                    </div>
                    <button onclick="toggleLessonComplete(${i})" class="text-gray-400 hover:text-green-500 trans-all">
                        <i class="far fa-circle ${isCompleted ? 'fas fa-check-circle text-green-500' : ''}"></i>
                    </button>
                </div>
            `;
        }
        container.innerHTML = html;
        updateProgressUI(courseId, totalVideos);
    }

    function toggleLessonComplete(lessonIndex) {
        const id = appState.currentCourseId;
        if (!id) return;
        if (!appState.progress[id]) appState.progress[id] = { completed: [] };
        
        const list = appState.progress[id].completed;
        if (list.includes(lessonIndex)) {
            appState.progress[id].completed = list.filter(i => i !== lessonIndex);
        } else {
            appState.progress[id].completed.push(lessonIndex);
        }
        
        localStorage.setItem("courseProgress", JSON.stringify(appState.progress));
        
        if (!appState.pendingProgressUpdates[id]) {
            appState.pendingProgressUpdates[id] = { completed: [...appState.progress[id].completed] };
        } else {
            appState.pendingProgressUpdates[id].completed = [...appState.progress[id].completed];
        }

        const course = allCourses.find(c => c.id === id);
        const total = course?.num || 10;
        renderPlaylistItems(id, total);
        updateProgressUI(id, total);
    }

    async function flushProgressUpdates() {
        if (Object.keys(appState.pendingProgressUpdates).length === 0 || !auth.currentUser) return;
        
        const batch = db.batch();
        const userId = auth.currentUser.uid;
        
        for (const [courseId, progress] of Object.entries(appState.pendingProgressUpdates)) {
            const docRef = db.collection('users').doc(userId).collection('progress').doc(courseId);
            batch.set(docRef, {
                completed: progress.completed,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        }
        
        try {
            await batch.commit();
            console.log(`✅ Progress batch written to Firestore (${Object.keys(appState.pendingProgressUpdates).length} courses)`);
            appState.pendingProgressUpdates = {};
        } catch (error) {
            console.error("Error writing progress batch:", error);
        }
    }

    function toggleCompleteVideo() {
        const id = appState.currentCourseId;
        if (!id) return;
        
        const course = allCourses.find(c => c.id === id);
        const total = course?.num || 10;
        
        if (!appState.progress[id]) appState.progress[id] = { completed: [] };
        const completedList = appState.progress[id].completed;
        
        let targetLesson = 1;
        while (completedList.includes(targetLesson) && targetLesson <= total) {
            targetLesson++;
        }
        
        if (targetLesson <= total) {
            toggleLessonComplete(targetLesson);
            showToast(`✅ تم إكمال الدرس ${targetLesson}`, 'success');
        } else {
            showToast('🎉 لقد أتممت جميع الدروس بالفعل!', 'info');
        }
    }

    function updateProgressUI(id, total) {
        const completed = appState.progress[id]?.completed.length || 0;
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('progressBarFill').style.width = `${percent}%`;
        document.getElementById('progressPercentage').innerText = `${percent}% مكتمل`;
    }

    // --- ✅ MY COURSES PAGE ---
    function renderMyCourses() {
        const grid = document.getElementById('myCoursesGrid');
        
        const lastViewed = JSON.parse(localStorage.getItem("lastViewedCourse"));
        const banner = document.getElementById('resumeLearningBanner');
        
        if (lastViewed && appState.myCourses.includes(lastViewed.id)) {
            banner.classList.remove('hidden');
            document.getElementById('resumeTitle').innerText = lastViewed.title;
            document.getElementById('resumeBtn').onclick = () => openPlayer(lastViewed.id);
        } else {
            banner.classList.add('hidden');
        }

        if (appState.myCourses.length === 0) {
            grid.innerHTML = `<div class="col-span-3 text-center text-gray-500 py-10">لم تقم بالتسجيل في أي دورة بعد.</div>`;
            return;
        }

        grid.innerHTML = appState.myCourses.map(id => {
            const course = allCourses.find(c => c.id === id);
            if (!course) return '';
            
            const total = course.num || 10;
            const completed = appState.progress[id]?.completed.length || 0;
            const percent = Math.round((completed / total) * 100);

            return `
                <div class="glass-card rounded-2xl p-4 flex gap-4 items-center cursor-pointer hover:bg-white/50 dark:hover:bg-gray-700/50 trans-all" onclick="openPlayer('${id}')">
                    <div class="w-20 h-20 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-2xl shrink-0">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-gray-800 dark:text-white truncate">${course.title}</h4>
                        <div class="flex justify-between items-center text-xs text-gray-500 dark:text-gray-400 mt-1 mb-2">
                            <span>${completed}/${total} درس</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div class="h-full bg-green-500 rounded-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <button onclick="removeCourse('${id}', event)" class="text-gray-300 hover:text-red-500 px-2 trans-all">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;
        }).join('');
    }

    function removeCourse(id, event) {
        event.stopPropagation();
        if (confirm("هل أنت متأكد من حذف الدورة؟")) {
            appState.myCourses = appState.myCourses.filter(cid => cid !== id);
            localStorage.setItem("myCourses", JSON.stringify(appState.myCourses));
            renderMyCourses();
            renderCourses();
            updateNavState();
        }
    }

    // --- ✅ NAVIGATION ---
    function showHome() {
        document.getElementById('coursesSection').classList.remove('hidden');
        document.getElementById('myCoursesView').classList.add('hidden');
        setActiveNav(0);
        window.scrollTo(0, 0);
    }

    function showMyCourses() {
        document.getElementById('coursesSection').classList.add('hidden');
        document.getElementById('myCoursesView').classList.remove('hidden');
        renderMyCourses();
        setActiveNav(1);
        window.scrollTo(0, 0);
    }

    function setActiveNav(index) {
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach((b, i) => {
            if (i === index) {
                b.classList.add('text-indigo-600', 'dark:text-indigo-400', 'active');
                b.classList.remove('text-gray-400');
            } else {
                b.classList.remove('text-indigo-600', 'dark:text-indigo-400', 'active');
                b.classList.add('text-gray-400');
            }
        });
    }

    function openWhatsApp() {
        window.open("https://wa.me/249924299798", "_blank");
    }

    function updateNavState() {
        if (appState.myCourses.length > 0) {
            document.getElementById('myCoursesDot').classList.remove('hidden');
        } else {
            document.getElementById('myCoursesDot').classList.add('hidden');
        }
    }

    // --- ✅ FILTERS ---
    function filterByCategory(cat) {
        renderCourses(cat === 'all' ? null : cat);
    }

    function setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCourses(e.target.value);
        });
        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            renderCourses(e.target.value);
        });
    }

    // --- ✅ INITIALIZE EVERYTHING ---
    document.addEventListener('DOMContentLoaded', () => {
        setupTheme();
        renderSkeletons();
        initializeApp();
        setupEventListeners();
        updateNavState();

        window.addEventListener('beforeunload', () => {
            flushProgressUpdates();
            flushEnrollments();
        });
    });

    // ===== antidebug (بقيت كما هي) =====
    (() => {
        document.addEventListener("keydown", (e) => {
            if (
                (e.ctrlKey && e.shiftKey && ["I", "C", "J", "L"].includes(e.key.toUpperCase())) ||
                (e.key === "F12") ||
                (e.ctrlKey && e.key.toUpperCase() === "U")
            ) {
                e.preventDefault();
            }
        });
        document.addEventListener("copy", e => e.preventDefault());
        document.addEventListener("cut", e => e.preventDefault());
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.addEventListener("selectstart", e => e.preventDefault());
        let detectSize = () => {
            if (window.outerWidth - window.innerWidth > 200 || window.outerHeight - window.innerHeight > 200) {
                console.clear();
            }
        };
        window.addEventListener("resize", detectSize);
        let start = performance.now();
        console.log("%c ", "font-size:200px;");
        let end = performance.now();
        if (end - start > 50) console.clear();
        const observer = new MutationObserver(() => { console.clear(); });
        observer.observe(document.documentElement, { attributes: true, childList: false, subtree: false });
        setInterval(() => {
            const t = Date.now();
            debugger;
            if (Date.now() - t > 100) console.clear();
        }, 500);
    })();
</script>
